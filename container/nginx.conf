server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location /api/v1 {
        proxy_pass https://api.escuelajs.co;
        proxy_set_header Host api.escuelajs.co;
        proxy_ssl_server_name on;
    }

    # Reverse-proxy each remote's federation artifacts under the container's
    # single public origin. The trailing slash strips the /mfe/<name>/ prefix,
    # so /mfe/home/remoteEntry.js -> home:8080/remoteEntry.js. Remotes are
    # internal-only (no published ports); they are never reachable directly.
    location ^~ /mfe/home/ {
        proxy_pass http://home:8080/;
    }

    location ^~ /mfe/product-detail/ {
        proxy_pass http://product-detail:8080/;
    }

    location ^~ /mfe/shared-core/ {
        proxy_pass http://shared-core:8080/;
    }

    location ^~ /mfe/shared-react/ {
        proxy_pass http://shared-react:8080/;
    }

    location ^~ /mfe/shared-angular/ {
        proxy_pass http://shared-angular:8080/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /remoteEntry.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
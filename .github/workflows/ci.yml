        with:
          node-version-file: shared-react/.nvmrc
          cache: npm
          cache-dependency-path: |
            shared-react/package-lock.json
            shared-core/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  shared-react-build:
    name: Shared React - Build
    runs-on: ubuntu-latest
    needs: shared-react-test
    defaults:
      run:
        working-directory: shared-react

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared-react/.nvmrc
          cache: npm
          cache-dependency-path: |
            shared-react/package-lock.json
            shared-core/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

  # ============================================================
  # SHARED-ANGULAR (depends on shared-core source)
  # ============================================================

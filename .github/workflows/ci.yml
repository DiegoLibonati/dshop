name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================================
  # SHARED-CORE (framework-agnostic base — no sibling deps)
  # ============================================================
  shared-core-lint-and-audit:
    name: Shared Core - Lint & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared-core

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared-core/.nvmrc
          cache: npm
          cache-dependency-path: shared-core/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript type-check
        run: npm run type-check

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  shared-core-test:
    name: Shared Core - Testing
    runs-on: ubuntu-latest
    needs: shared-core-lint-and-audit
    defaults:
      run:
        working-directory: shared-core

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared-core/.nvmrc
          cache: npm
          cache-dependency-path: shared-core/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  shared-core-build:
    name: Shared Core - Build
    runs-on: ubuntu-latest
    needs: shared-core-test
    defaults:
      run:
        working-directory: shared-core

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared-core/.nvmrc
          cache: npm
          cache-dependency-path: shared-core/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

  # ============================================================
  # SHARED-REACT (depends on shared-core source)
  # ============================================================
  shared-react-lint-and-audit:
    name: Shared React - Lint & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared-react

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared-react/.nvmrc
          cache: npm
          cache-dependency-path: |
            shared-react/package-lock.json
            shared-core/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core

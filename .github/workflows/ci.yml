            shared-core/package-lock.json
            shared-react/package-lock.json
            shared-angular/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Install shared-react dependencies
        working-directory: shared-react
        run: npm ci --ignore-scripts

      - name: Install shared-angular dependencies
        working-directory: shared-angular
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  product-detail-build:
    name: Product Detail - Build
    runs-on: ubuntu-latest
    needs: product-detail-test
    defaults:
      run:
        working-directory: product-detail

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: product-detail/.nvmrc
          cache: npm
          cache-dependency-path: |
            product-detail/package-lock.json
            shared-core/package-lock.json
            shared-react/package-lock.json
            shared-angular/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Install shared-react dependencies
        working-directory: shared-react
        run: npm ci --ignore-scripts

      - name: Install shared-angular dependencies
        working-directory: shared-angular
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

  # ============================================================
  # DOCKER (dev) - build-only smoke test, all images in parallel
  #   context = <project>  (Dockerfile.development COPYs from module root)
  # ============================================================
  docker-build-dev:
    name: Docker Build (dev) - ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs:
      - shared-core-build
      - shared-react-build
      - shared-angular-build
      - container-build
      - home-build
      - product-detail-build

    strategy:
      fail-fast: false
      matrix:
        project:
          - shared-core
          - shared-react
          - shared-angular
          - container
          - home
          - product-detail

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build ${{ matrix.project }} (development)
        uses: docker/build-push-action@v6.15.0
        with:
          context: ${{ matrix.project }}
          file: ${{ matrix.project }}/Dockerfile.development
          push: false
          tags: dshop-${{ matrix.project }}:dev

  # ============================================================
  # DOCKER (prod) - build all images, push to GHCR on push to main
  #   context = .  (Dockerfile.production COPYs from repo root)
  #   VITE_REMOTE_* are baked at build-time; the container's nginx
  #   proxies each /mfe/<module>/ path, so relative URLs are correct.
  # ============================================================
  docker-publish-prod:
    name: Docker Publish (prod) - ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs:
      - shared-core-build
      - shared-react-build
      - shared-angular-build
      - container-build
      - home-build
      - product-detail-build
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        project:
          - shared-core
          - shared-react
          - shared-angular
          - container
          - home
          - product-detail

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.project }} (production)
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: ${{ matrix.project }}/Dockerfile.production
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.project }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.project }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_REMOTE_SHARED_CORE_URL=/mfe/shared-core/remoteEntry.js
            VITE_REMOTE_SHARED_REACT_URL=/mfe/shared-react/remoteEntry.js
            VITE_REMOTE_SHARED_ANGULAR_URL=/mfe/shared-angular/remoteEntry.js
            VITE_REMOTE_HOME_URL=/mfe/home/remoteEntry.js
            VITE_REMOTE_PRODUCT_DETAIL_URL=/mfe/product-detail/remoteEntry.js

  # ============================================================
  # DEPLOY - ship the prod compose to the server and roll the stack
  # ============================================================
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: docker-publish-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install cloudflared (pinned 2026.5.1 — service-token bug in 2026.6.x)
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/download/2026.5.1/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Setup SSH key and config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Copy compose file to server
        run: scp prod.docker-compose.yml deploy-target:"${{ secrets.DEPLOY_PATH }}/"

      - name: Pull image & restart container
        run: |
          ssh deploy-target <<'ENDSSH'
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"
          docker compose -f prod.docker-compose.yml pull
          docker compose -f prod.docker-compose.yml up -d
          docker image prune -f
          ENDSSH

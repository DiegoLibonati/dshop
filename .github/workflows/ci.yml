    runs-on: ubuntu-latest
    needs: product-detail-lint-and-audit
    defaults:
      run:
        working-directory: product-detail

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: product-detail/.nvmrc
          cache: npm
          cache-dependency-path: |
            product-detail/package-lock.json
            shared-core/package-lock.json
            shared-react/package-lock.json
            shared-angular/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Install shared-react dependencies
        working-directory: shared-react
        run: npm ci --ignore-scripts

      - name: Install shared-angular dependencies
        working-directory: shared-angular
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  product-detail-build:
    name: Product Detail - Build
    runs-on: ubuntu-latest
    needs: product-detail-test
    defaults:
      run:
        working-directory: product-detail

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: product-detail/.nvmrc
          cache: npm
          cache-dependency-path: |
            product-detail/package-lock.json
            shared-core/package-lock.json
            shared-react/package-lock.json
            shared-angular/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Install shared-react dependencies
        working-directory: shared-react
        run: npm ci --ignore-scripts

      - name: Install shared-angular dependencies
        working-directory: shared-angular
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

  # ============================================================
  # DOCKER - all images in parallel, after every build passes
  #   dev  -> context = <project>  (Dockerfile.development COPYs from module root)
  #   prod -> context = .          (Dockerfile.production COPYs from repo root)
  # ============================================================
  docker-build:
    name: Docker Build - ${{ matrix.project }} ${{ matrix.tag }}
    runs-on: ubuntu-latest
    needs:
      - shared-core-build
      - shared-react-build
      - shared-angular-build
      - container-build
      - home-build
      - product-detail-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: shared-core
            dockerfile: Dockerfile.development
            tag: dshop-shared-core:dev
          - project: shared-core
            dockerfile: Dockerfile.production
            tag: dshop-shared-core:prod
            context: .
          - project: shared-react
            dockerfile: Dockerfile.development
            tag: dshop-shared-react:dev
          - project: shared-react
            dockerfile: Dockerfile.production
            tag: dshop-shared-react:prod
            context: .
          - project: shared-angular
            dockerfile: Dockerfile.development
            tag: dshop-shared-angular:dev
          - project: shared-angular
            dockerfile: Dockerfile.production
            tag: dshop-shared-angular:prod
            context: .
          - project: container
            dockerfile: Dockerfile.development
            tag: dshop-container:dev
          - project: container
            dockerfile: Dockerfile.production
            tag: dshop-container:prod
            context: .
          - project: home
            dockerfile: Dockerfile.development
            tag: dshop-home:dev
          - project: home
            dockerfile: Dockerfile.production
            tag: dshop-home:prod
            context: .
          - project: product-detail
            dockerfile: Dockerfile.development
            tag: dshop-product-detail:dev
          - project: product-detail
            dockerfile: Dockerfile.production
            tag: dshop-product-detail:prod
            context: .

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build ${{ matrix.project }}/${{ matrix.dockerfile }}
        uses: docker/build-push-action@v6.15.0
        with:
          context: ${{ matrix.context || matrix.project }}
          file: ${{ matrix.project }}/${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.tag }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript type-check
        run: npm run type-check

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  shared-angular-test:
    name: Shared Angular - Testing
    runs-on: ubuntu-latest
    needs: shared-angular-lint-and-audit
    defaults:
      run:
        working-directory: shared-angular

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared-angular/.nvmrc
          cache: npm
          cache-dependency-path: |
            shared-angular/package-lock.json
            shared-core/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Run tests

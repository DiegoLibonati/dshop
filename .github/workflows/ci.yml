      - name: Install shared-angular dependencies
        working-directory: shared-angular
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

  # ============================================================
  # HOME (React remote — depends on shared-core/react/angular)
  # ============================================================
  home-lint-and-audit:
    name: Home - Lint & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: home

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: home/.nvmrc
          cache: npm
          cache-dependency-path: |
            home/package-lock.json
            shared-core/package-lock.json
            shared-react/package-lock.json
            shared-angular/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Install shared-react dependencies
        working-directory: shared-react
        run: npm ci --ignore-scripts

      - name: Install shared-angular dependencies
        working-directory: shared-angular
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript type-check
        run: npm run type-check

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  home-test:
    name: Home - Testing
    runs-on: ubuntu-latest
    needs: home-lint-and-audit
    defaults:
      run:
        working-directory: home

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: home/.nvmrc
          cache: npm
          cache-dependency-path: |
            home/package-lock.json
            shared-core/package-lock.json
            shared-react/package-lock.json
            shared-angular/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install shared-core dependencies
        working-directory: shared-core
        run: npm ci --ignore-scripts

      - name: Install shared-react dependencies
        working-directory: shared-react
        run: npm ci --ignore-scripts

      - name: Install shared-angular dependencies
        working-directory: shared-angular
        run: npm ci --ignore-scripts

